plugins {
    id 'com.android.application'
}

android {
    namespace 'com.exhxx78.vpn'
    compileSdk 34

    defaultConfig {
        applicationId "com.exhxx78.vpn"
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName "1.1"
    }
}

dependencies {
    // جلب مكتبة محرك Xray الجاهزة للأندرويد
    implementation 'com.github.xtls:libxray:1.8.0'
}
